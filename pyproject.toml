# Root holds shared tooling config only; it builds no distribution. The pixi
# workspace lives in pixi.toml, the two distributions in packages/*/pyproject.toml.

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [".pixi"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "TID"]

[tool.ruff.lint.isort]
known-first-party = ["pytodo"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
namespace_packages = true
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["packages/core/tests", "packages/cli/tests"]
