# Root holds shared tooling config only; it builds no distribution. The pixi
# workspace lives in pixi.toml, the two distributions in packages/*/pyproject.toml.

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [".pixi"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "TID"]

[tool.ruff.lint.isort]
known-first-party = ["neverland"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection idiom: Depends()/Query() as argument defaults.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
namespace_packages = true
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["packages/core/tests", "packages/cli/tests", "packages/server/tests"]
# importlib mode: co-located test suites may share a basename (test_layering.py)
# across packages without the default prepend-mode module clash.
addopts = "--import-mode=importlib"
