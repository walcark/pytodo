[project]
name = "pytodo-server"
version = "0.3.0"
description = "Self-hosted FastAPI server and web UI for pytodo (frontend on the shared core)."
authors = [{name = "walcark", email = "kevin.walcarius@cnes.fr"}]
requires-python = ">=3.11"
dependencies = [
    "pytodo-core==0.3.0",
    "fastapi>=0.110",
    "uvicorn>=0.29",
]

[project.scripts]
pytodo-server = "pytodo.server.cli:main"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/pytodo/server"]
# The compiled SPA is git-ignored (a build artifact); force it into the wheel.
artifacts = ["src/pytodo/server/static/**"]

# server, like cli, is an application layer: it may use core, never a sibling
# frontend. Enforced here and by tests/test_layering.py.
[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"pytodo.cli".msg = "server must not import cli (layering); see docs/model.md."
