[project]
name = "neverland-server"
version = "0.4.0"
description = "Self-hosted FastAPI server and web UI for neverland (frontend on the shared core)."
readme = "README.md"
authors = [{name = "walcark", email = "kevin.walcarius@cnes.fr"}]
requires-python = ">=3.11"
dependencies = [
    "neverland-core==0.4.0",
    "fastapi>=0.110",
    "uvicorn>=0.29",
]

[project.scripts]
neverland-server = "neverland.server.cli:main"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/neverland/server"]
# The compiled SPA is git-ignored (a build artifact); force it into the wheel.
artifacts = ["src/neverland/server/static/**"]

# The sdist must carry the compiled SPA too, so a build from sdist is complete
# (the frontend/ sources ship as well, but the static assets are what runs).
[tool.hatch.build.targets.sdist]
artifacts = ["src/neverland/server/static/**"]

# server, like cli, is an application layer: it may use core, never a sibling
# frontend. Enforced here and by tests/test_layering.py.
[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"neverland.cli".msg = "server must not import cli (layering); see docs/model.md."
