[project]
name = "pytodo-cli"
version = "0.3.0"
description = "Command-line interface for pytodo (fzf/gum prompts, rich output)."
authors = [{name = "walcark", email = "kevin.walcarius@cnes.fr"}]
requires-python = ">=3.11"
dependencies = [
    "pytodo-core==0.3.0",
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
todo = "pytodo.cli.main:app"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/pytodo/cli"]
