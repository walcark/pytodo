[project]
name = "neverland-cli"
version = "0.4.0"
description = "Command-line interface for neverland (fzf/gum prompts, rich output)."
readme = "README.md"
authors = [{name = "walcark", email = "kevin.walcarius@cnes.fr"}]
requires-python = ">=3.11"
dependencies = [
    "neverland-core==0.4.0",
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
todo = "neverland.cli.main:app"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/neverland/cli"]
