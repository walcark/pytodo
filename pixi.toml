[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

# Both distributions installed editable, so the CLI resolves its `pytodo-core`
# dependency against the local source, not PyPI.
[pypi-dependencies]
pytodo-core = { path = "packages/core", editable = true }
pytodo-cli = { path = "packages/cli", editable = true }

[dependencies]
python = ">=3.11"
fzf = "*"

[tasks]
todo = "todo"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[feature.dev.dependencies]
ruff = "*"
mypy = ">=1.5"
pytest = "*"
pytest-cov = ">=6.0"

[feature.dev.tasks]
fmt = "ruff format ."
fmt-check = "ruff format --check ."
lint = "ruff check packages"
type-check = "mypy -p pytodo.core -p pytodo.cli"
test = "pytest -q --cov=pytodo --cov-report=term-missing"
all = { depends-on = ["fmt", "lint", "type-check", "test"] }
