[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

# Both distributions installed editable, so the CLI resolves its `neverland-core`
# dependency against the local source, not PyPI.
[pypi-dependencies]
neverland-core = { path = "packages/core", editable = true }
neverland-cli = { path = "packages/cli", editable = true }
neverland-server = { path = "packages/server", editable = true }

[dependencies]
python = ">=3.11"
fzf = "*"

[tasks]
todo = "todo"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[feature.dev.dependencies]
ruff = "*"
mypy = ">=1.5"
pytest = "*"
pytest-cov = ">=6.0"
httpx = "*"      # FastAPI TestClient
nodejs = "*"     # builds the React SPA (packages/server/web)

[feature.dev.tasks]
fmt = "ruff format ."
fmt-check = "ruff format --check ."
lint = "ruff check packages"
type-check = "mypy -p neverland.core -p neverland.cli -p neverland.server"
test = "pytest -q --cov=neverland --cov-report=term-missing --cov-report=xml"
all = { depends-on = ["fmt", "lint", "type-check", "test"] }
build-web = { cmd = "npm install && npm run build", cwd = "packages/server/frontend" }
